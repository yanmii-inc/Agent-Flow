name: Release
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
          - target: darwin-arm64
            runner: macos-latest
          - target: darwin-x64
            runner: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run build:${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: consign-${{ matrix.target }}
          path: consign-${{ matrix.target }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - run: |
          mkdir -p assets && find . -type f -name 'consign-*' -exec mv {} assets/ \;
      - uses: softprops/action-gh-release@v2
        with:
          files: assets/*
          generate_release_notes: true
